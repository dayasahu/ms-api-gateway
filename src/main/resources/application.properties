spring.application.name=ms-api-gateway
server.port=8888

# Actuator + metrics
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops
management.endpoint.health.probes.enabled=true

# Gateway routes
# Employee route
spring.cloud.gateway.server.webflux.routes[0].id=employee
spring.cloud.gateway.server.webflux.routes[0].uri=http://employee:8080
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/employee/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1
# Department route
spring.cloud.gateway.server.webflux.routes[1].id=department
spring.cloud.gateway.server.webflux.routes[1].uri=http://department:8080
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/department/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

# Auth route — no JWT filter applied (whitelisted in JwtAuthenticationFilter)
spring.cloud.gateway.server.webflux.routes[2].id=auth-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://auth-service:9000
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# JWT secret — must match auth-service JWT_SECRET
jwt.secret=${JWT_SECRET:myDefaultSecretKey1234567890abcdefghij}
